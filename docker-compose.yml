services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # POSTGRES_PASSWORD берётся из .env.production (а не из дефолтного .env),
    # поэтому передаём весь файл напрямую в контейнер — лишние переменные Postgres игнорирует.
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: kulstore_shop
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kulstore_shop"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Порт наружу не публикуем — БД доступна только сервису web внутри сети.

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    volumes:
      # Пользовательские загрузки (фото товаров, лого) переживают пересборку контейнера.
      - ./public/uploads:/app/public/uploads
    ports:
      # Слушаем только localhost — наружу отдаём через Nginx на хосте.
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
